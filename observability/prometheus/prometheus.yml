global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'greenscope'
    static_configs:
      - targets: ['greenscope:8000']
    metrics_path: /metrics

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['greenscope-cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['greenscope-node-exporter:9100']
