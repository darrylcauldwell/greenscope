<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GreenScope{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        :root {
            --green-accent: #30D158;
            --green-dark: #248A3D;
            --green-light: #D1FAE5;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-secondary: #1e293b;
                --bg-card: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --green-light: #064e3b;
            }
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .card { background: var(--bg-card); border: 1px solid var(--border); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen font-sans">
    <nav class="border-b" style="border-color: var(--border); background: var(--bg-secondary);">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-xl font-bold" style="color: var(--green-accent);">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                GreenScope
            </a>
            <div class="flex gap-4 text-sm">
                <a href="/" class="hover:underline" style="color: var(--text-secondary);">Dashboard</a>
                <a href="/methodology" class="hover:underline" style="color: var(--text-secondary);">Methodology</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t mt-12 py-6 text-center text-sm" style="border-color: var(--border); color: var(--text-secondary);">
        <p>GreenScope &mdash; Software Carbon Intensity monitoring for <a href="https://dreamfold.dev" class="underline" style="color: var(--green-accent);">dreamfold.dev</a></p>
        <p class="mt-1">Following the <a href="https://sci-guide.greensoftware.foundation/" class="underline" style="color: var(--green-accent);">Green Software Foundation SCI Specification</a></p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
